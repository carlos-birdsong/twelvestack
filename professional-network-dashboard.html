            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.5em;
            vertical-align: middle;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-5px); }
        .stat-number {
            font-size: 3em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .stat-label { color: #666; font-size: 0.9em; margin-top: 5px; }
        .section {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .section h2 {
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;

        .filters { display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 20px; }

        .filter-group label { font-size: 0.85em; color: #666; font-weight: 500; }
        select, input[type="text"] {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1em;
            min-width: 180px;
        }
        select:focus, input[type="text"]:focus { outline: none; border-color: #667eea; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; color: #333; cursor: pointer; }
        th:hover { background: #e9ecef; }
        tr:hover { background: #f8f9fa; }
        .score-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85em;
        }
        .score-high { background: #d4edda; color: #155724; }
        .score-medium { background: #fff3cd; color: #856404; }
        .score-low { background: #f8d7da; color: #721c24; }
        .category-tag {
            display: inline-block;
            padding: 3px 10px;
            background: #e9ecef;
            border-radius: 15px;
            font-size: 0.8em;
            margin: 2px;
            color: #495057;
        }
        .category-tag.icf { background: #cce5ff; color: #004085; }
        .category-tag.lead { background: #d4edda; color: #155724; }
        .category-tag.supporter { background: #fff3cd; color: #856404; }
        a { color: #667eea; text-decoration: none; }
        a:hover { text-decoration: underline; }
        .action-text {
            font-size: 0.85em;
            padding: 5px 10px;
            background: #f8f9fa;
            border-radius: 5px;
            display: inline-block;
        }
        .action-hot { background: #f8d7da; color: #721c24; font-weight: 600; }
        .action-warm { background: #fff3cd; color: #856404; }
        .action-reconnect { background: #cce5ff; color: #004085; }
        .chart-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .chart-container { grid-template-columns: 1fr; } }
        .chart-box { background: #f8f9fa; border-radius: 10px; padding: 20px; }
        .chart-box h3 { margin-bottom: 15px; color: #333; }
        .bar-chart { display: flex; flex-direction: column; gap: 10px; }
        .bar-row { display: flex; align-items: center; gap: 10px; }
        .bar-label { width: 120px; font-size: 0.9em; color: #666; }
        .bar-container { flex: 1; height: 25px; background: #e9ecef; border-radius: 5px; overflow: hidden; }
        .bar { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); border-radius: 5px; }
        .bar-value { width: 40px; text-align: right; font-weight: 600; color: #333; }
        .timeline-chart { display: flex; align-items: flex-end; justify-content: space-around; height: 150px; padding-top: 20px; }
        .timeline-bar { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .timeline-bar-fill { width: 30px; background: linear-gradient(180deg, #667eea, #764ba2); border-radius: 5px 5px 0 0; }
        .timeline-label { font-size: 0.75em; color: #666; }
        .timeline-value { font-size: 0.8em; font-weight: 600; color: #333; }
        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .pagination button {

            background: #667eea;
            color: white;
            border-radius: 5px;

        }

        .pagination button:disabled { background: #ccc; cursor: not-allowed; }
        .pagination span { padding: 8px 15px; color: #333; }
    </style>
</head>

            populateCategoryFilter();
            renderTable();
            document.getElementById('search').addEventListener('input', applyFilters);
            document.getElementById('filter-category').addEventListener('change', applyFilters);
            document.getElementById('sort-by').addEventListener('change', applyFilters);
            document.getElementById('sort-order').addEventListener('change', applyFilters);
            document.getElementById('prev-page').addEventListener('click', () => changePage(-1));
            document.getElementById('next-page').addEventListener('click', () => changePage(1));
        });

        function updateStats() {
            document.getElementById('total-connections').textContent = connections.length;
            const avgRel = connections.reduce((sum, c) => sum + (c.relationship_score || 0), 0) / connections.length;
            document.getElementById('avg-relationship').textContent = avgRel.toFixed(0);
            const hotLeads = connections.filter(c => c.lead_score >= 50 && c.relationship_score >= 40).length;
            document.getElementById('hot-leads').textContent = hotLeads;
            const msgCount = connections.filter(c => c.has_messaged).length;
            document.getElementById('msg-connections').textContent = msgCount;
        }

        function renderCategoryChart() {
            const container = document.getElementById('category-chart');
            const maxCount = Math.max(...Object.values(categoryStats));
            container.innerHTML = Object.entries(categoryStats)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 8)
                .map(([cat, count]) => `
                    <div class="bar-row">
                        <div class="bar-label">${cat}</div>
                        <div class="bar-container">
                            <div class="bar" style="width: ${(count / maxCount) * 100}%"></div>
                        </div>
                        <div class="bar-value">${count}</div>
                    </div>
                `).join('');
        }

        function renderTimelineChart() {
            const container = document.getElementById('timeline-chart');
            const years = Object.keys(timelineStats).sort();
            const maxCount = Math.max(...Object.values(timelineStats));
            container.innerHTML = years.map(year => `
                <div class="timeline-bar">
                    <div class="timeline-value">${timelineStats[year]}</div>
                    <div class="timeline-bar-fill" style="height: ${(timelineStats[year] / maxCount) * 120}px"></div>
                    <div class="timeline-label">${year}</div>
                </div>
            `).join('');
        }

        function populateCategoryFilter() {
            const select = document.getElementById('filter-category');
            Object.keys(categoryStats).forEach(cat => {
                const option = document.createElement('option');
                option.value = cat;
                option.textContent = cat;
                select.appendChild(option);
            });
        }

        function applyFilters() {
            const search = document.getElementById('search').value.toLowerCase();
            const category = document.getElementById('filter-category').value;
            const sortBy = document.getElementById('sort-by').value;
            const sortOrder = document.getElementById('sort-order').value;
            filteredData = connections.filter(c => {
                const matchSearch = !search ||
                    (c.full_name || '').toLowerCase().includes(search) ||
                    (c.Company || '').toLowerCase().includes(search) ||
                    (c.Position || '').toLowerCase().includes(search);
                const matchCategory = !category || (c.categories || '').includes(category);
                return matchSearch && matchCategory;
            });
            filteredData.sort((a, b) => {
                let aVal = a[sortBy];
                let bVal = b[sortBy];
                if (sortBy === 'full_name') {
                    aVal = (aVal || '').toLowerCase();
                    bVal = (bVal || '').toLowerCase();
                }
                if (sortBy === 'connected_date') {
                    aVal = aVal ? new Date(aVal) : new Date(0);
                    bVal = bVal ? new Date(bVal) : new Date(0);
                }
                if (aVal < bVal) return sortOrder === 'asc' ? -1 : 1;
                if (aVal > bVal) return sortOrder === 'asc' ? 1 : -1;
                return 0;
            });
            currentPage = 1;
            renderTable();
        }

        function renderTable() {
            const tbody = document.querySelector('#connections-table tbody');
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = filteredData.slice(start, end);
            tbody.innerHTML = pageData.map(c => `
                <tr>
                    <td>${c.full_name || 'Unknown'}</td>
                    <td>${c.Company || '-'}</td>
                    <td>${c.Position || '-'}</td>
                    <td><span class="score-badge ${getScoreClass(c.relationship_score)}">${(c.relationship_score || 0).toFixed(0)}</span></td>
                    <td><span class="score-badge ${getScoreClass(c.lead_score)}">${(c.lead_score || 0).toFixed(0)}</span></td>
                    <td>${renderCategories(c.categories)}</td>
                    <td><span class="action-text ${getActionClass(c.recommended_action)}">${c.recommended_action || '-'}</span></td>
                </tr>
            `).join('');
            const totalPages = Math.ceil(filteredData.length / pageSize);
            document.getElementById('page-info').textContent = `Page ${currentPage} of ${totalPages}`;
            document.getElementById('prev-page').disabled = currentPage === 1;
            document.getElementById('next-page').disabled = currentPage === totalPages;
        }

        function getScoreClass(score) {
            if (score >= 60) return 'score-high';
            if (score >= 30) return 'score-medium';
            return 'score-low';
        }

        function renderCategories(cats) {
            if (!cats) return '-';
            return cats.split(', ').map(cat => {
                let className = 'category-tag';
                if (cat.includes('ICF')) className += ' icf';
                if (cat.includes('Client') || cat.includes('Lead')) className += ' lead';
                if (cat.includes('Supporter')) className += ' supporter';
                return `<span class="${className}">${cat}</span>`;
            }).join('');
        }

        function getActionClass(action) {
            if (!action) return '';
            if (action.includes('HOT')) return 'action-hot';
            if (action.includes('WARM')) return 'action-warm';
            if (action.includes('RECONNECT') || action.includes('THANK')) return 'action-reconnect';
            return '';
        }

        function changePage(delta) {
            const totalPages = Math.ceil(filteredData.length / pageSize);
            currentPage = Math.max(1, Math.min(totalPages, currentPage + delta));
            renderTable();
        }
    </script>
</body>
</html>
